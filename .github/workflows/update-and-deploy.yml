name: Update movies and deploy Pages

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. 15:00 UTC is 00:00 KST.
    - cron: "0 15 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Crawl current movies
        env:
          PYTHONUNBUFFERED: "1"
        run: python -m src.scrape --output docs/data/movies.json --pretty

      - name: Commit updated movie data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/movies.json
          if git diff --cached --quiet; then
            echo "No movie data changes."
          else
            git commit -m "chore: update movie data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
